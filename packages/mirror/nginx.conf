# Legion Mirror — hardened nginx (Chrome/Firefox TLS fingerprint compatible)
# Substitute TARGET_HOST / TARGET_ORIGIN / SERVER_NAME at deploy time via domain-rotator.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout 65;
  server_tokens off;

  proxy_connect_timeout 60s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;
  proxy_buffering on;

  # TLS profile — modern AEAD ciphers (Chrome 122 / Firefox 123 compatible)
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  server {
    listen 443 ssl http2;
    server_name mirror.example.com;

    ssl_certificate     /etc/nginx/ssl/active.crt;
    ssl_certificate_key /etc/nginx/ssl/active.key;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
      try_files /index.html =404;
      add_header Cache-Control "no-store";
      add_header X-Legion-Mirror "active";
    }

    location / {
      proxy_pass https://TARGET_HOST;
      proxy_ssl_server_name on;
      proxy_http_version 1.1;
      proxy_set_header Host TARGET_HOST;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header Connection "";
      proxy_redirect off;
    }
  }
}
