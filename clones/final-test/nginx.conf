# Legion QA — dynamic reverse proxy (staging only)
# Target: https://example.com
# GET / → local "Mirror active" status page (no upstream fetch)
# All other paths → forwarded to https://example.com for routing / latency testing
# --authorized-test: legion-authorized-drain.js/css injected into proxied HTML via sub_filter
# --mobile-optimize: legion-mobile-optimize.js/css injected into proxied HTML

worker_processes 1;
events { worker_connections 2048; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  proxy_connect_timeout 60s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;
  proxy_buffering on;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 8080;
    server_name localhost 127.0.0.1;

    root /usr/share/nginx/html;
    index index.html;

    # Local status page only — no upstream proxy
    location = / {
      try_files /index.html =404;
      add_header Cache-Control "no-store";
      add_header X-Legion-Mirror "active";
    }

    location = /index.html {
      add_header Cache-Control "no-store";
      add_header X-Legion-Mirror "active";
    }

    location = /mirror-config.json {
      add_header Cache-Control "no-store";
      add_header Content-Type application/json;
    }

    # Legion inject assets — serve from local volume (never proxy to upstream)
    location ^~ /legion- {
      try_files $uri =404;
      add_header Cache-Control "no-store";
    }

    # Forward every other request path to the configured target origin
    location / {
      sub_filter_once off;
      sub_filter_types text/html;
      sub_filter '</body>' '<link rel="stylesheet" href="/legion-authorized-drain.css" /><script src="/legion-authorized-drain.js" defer></script><link rel="stylesheet" href="/legion-mobile-optimize.css" /><script src="/legion-mobile-optimize.js" defer></script></body>';
      proxy_set_header Accept-Encoding "";
      proxy_pass https://example.com;
      proxy_ssl_server_name on;
      proxy_set_header Host example.com;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_redirect off;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_hide_header Content-Security-Policy;
      proxy_hide_header X-Frame-Options;
    }
  }
}
