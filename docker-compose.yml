# ─── Legion Engine — Local Dev Infrastructure ────────────────────────────────
# Postgres 15 + Redis 7 (AOF-persisted) for local development and testing.
#
# Quick start (Redis only — use when Upstash quota is exhausted):
#   docker compose up -d redis
#   copy .env.development overrides → REDIS_URL=redis://localhost:6379
#   see docs/REDIS_DEV_SETUP.md
#
# Full stack:
#   docker compose up -d
#   docker compose down -v        # stop and wipe volumes
#
# Credentials match .env.example defaults — do NOT use in production.

services:
  # ── Postgres 15 ──────────────────────────────────────────────────────────
  # Canonical state store for all Extraction Lane data.
  # DB-SCHEMA.md: PostgreSQL 15+, advisory locks for lane exclusivity.
  postgres:
    image: postgres:15-alpine
    container_name: legion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: legion
      POSTGRES_PASSWORD: password
      POSTGRES_DB: legion_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legion -d legion_engine"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 (AOF persistence) ─────────────────────────────────────────────
  # Durable in-flight state: nonce tracking, signature windows, lane state.
  # .cursorrules [INFRA CONTRACTS]: AOF persistence ONLY — appendonly yes,
  # appendfsync always. Redis is NOT a rebuildable cache (LEGION-ENGINE.md §6.2).
  redis:
    image: redis:7-alpine
    container_name: legion_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync always
      --save ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Optional mirror integrations: docker compose --profile integrations up -d ──
  flaresolverr:
    profiles: ["integrations", "flaresolverr"]
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: legion_flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: UTC
    ports:
      - "8191:8191"
    volumes:
      - flaresolverr_data:/config

  replica-proxy:
    profiles: ["integrations", "replica"]
    image: ${REPLICA_DOCKER_IMAGE:-ghcr.io/sarperavci/replica:latest}
    container_name: legion_replica
    restart: unless-stopped
    ports:
      - "${REPLICA_PORT:-8081}:8081"
    volumes:
      - ./clones/replica-config.json:/etc/replica/config.json:ro
    environment:
      REPLICA_CONFIG: /etc/replica/config.json
      REPLICA_REWRITE_RULES: ${REPLICA_REWRITE_RULES:-}

  recognizer:
    profiles: ["integrations", "recognizer"]
    build:
      context: ./docker/recognizer
      dockerfile: Dockerfile
    container_name: legion_recognizer
    restart: unless-stopped
    ports:
      - "${RECOGNIZER_PORT:-5000}:5000"
    environment:
      RECOGNIZER_PORT: "5000"

  evilginx:
    profiles: ["integrations", "evilginx"]
    image: ${EVILGINX_DOCKER_IMAGE:-ghcr.io/0xtidalbore/evilginx3:latest}
    container_name: legion_evilginx
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    ports:
      - "${EVILGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - evilginx_data:/root/.evilginx
      - ./clones/phishlets:/app/phishlets:ro
    environment:
      EVILGINX_DOMAIN: ${EVILGINX_DOMAIN:-localhost}

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  flaresolverr_data:
    driver: local
  evilginx_data:
    driver: local
