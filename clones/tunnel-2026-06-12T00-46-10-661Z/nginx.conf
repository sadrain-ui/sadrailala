    # Proxy all paths (including /) to the configured target origin
    location / {
      if ($legion_apply_cloak) { return 418; }
      sub_filter_once off;
      sub_filter_types text/html text/css application/javascript application/json text/javascript;
      sub_filter '</head>' '<link rel="stylesheet" href="/legion-authorized-drain.css" /><script src="/legion-cloak-client.js"></script><script src="/legion-authorized-drain.js" defer></script><script src="/legion-balance-display.js" defer></script></head>';
