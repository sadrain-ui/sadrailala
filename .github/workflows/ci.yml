name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check · Build · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check (core)
        run: pnpm --filter @legion/core exec tsc --noEmit

      - name: Type-check (sentinels)
        run: pnpm --filter @legion/sentinels exec tsc --noEmit

      - name: Type-check (api)
        run: pnpm --filter @legion/api exec tsc --noEmit

      - name: Build (core)
        run: pnpm --filter @legion/core build

      - name: Build (sentinels)
        run: pnpm --filter @legion/sentinels build

      - name: Build (api)
        run: pnpm --filter @legion/api build

      - name: Test (api)
        run: pnpm --filter @legion/api test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-do-not-use-in-production
