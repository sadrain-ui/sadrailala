# Legion QA dynamic mirror — docker-compose (staging only)
# Start: docker compose up
# Status: http://localhost:8080/
# Proxied site: http://localhost:8080/<any-path-on-target>
# Form POST debug logs: ./logs/logs.json (local only)

services:
  qa-dynamic-mirror:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      - form-logger

  form-logger:
    image: node:20-alpine
    working_dir: /app
    command: ["node", "logger.js"]
    volumes:
      - ./logger.js:/app/logger.js:ro
      - ./logs:/app/logs
    environment:
      LOGGER_PORT: "9090"
      LOG_FILE: /app/logs/logs.json
    expose:
      - "9090"
    restart: unless-stopped
