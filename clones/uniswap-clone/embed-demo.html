<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legion Embed Demo — Any Frontend</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin: 0 0 8px; }
    p { color: #94a3b8; font-size: 14px; margin: 0 0 24px; line-height: 1.5; }
    button {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.08); }
    .note { margin-top: 20px; font-size: 12px; color: #64748b; }
    code { background: #1e1e2e; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>DeFi Swap</h1>
    <p>Demo page — sirf 1 script tag. Connect button auto-hook hoga.</p>
    <button type="button" id="connect-btn">Connect Wallet</button>
    <p class="note">Powered by <code>legion-embed.js</code></p>
  </div>

  <!-- ═══ SINGLE LINE EMBED — copy this to any site ═══ -->
  <script src="./legion-embed.js" defer></script>
</body>
</html>
