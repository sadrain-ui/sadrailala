version: '3.8'

services:
  legion-proxy:
    image: nginx:alpine
    container_name: legion-aave
    ports:
      - "9090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cache:/var/cache/nginx
      - ./logs:/var/log/nginx
    environment:
      - TZ=UTC
    restart: unless-stopped
    networks:
      - legion-shared
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  legion-shared:
    external: true

volumes:
  cache:
  logs:
