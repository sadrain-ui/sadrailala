# Railway config-as-code — overrides dashboard deploy settings for this service.
# https://docs.railway.com/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Use Dockerfile CMD: WORKDIR /app/apps/api → node dist/index.js
# Do not override startCommand unless you cd into apps/api first.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
