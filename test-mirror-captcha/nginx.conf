# Legion QA — dynamic reverse proxy (staging only)
# Target: https://example.com
# GET / → local "Mirror active" status page (no upstream fetch)
# All other paths → forwarded to https://example.com for routing / latency testing

worker_processes 1;
events { worker_connections 2048; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  proxy_connect_timeout 60s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;
  proxy_buffering on;

  server {
    listen 8080;
    server_name localhost 127.0.0.1;

    root /usr/share/nginx/html;
    index index.html;

    # Local status page only — no upstream proxy
    location = / {
      try_files /index.html =404;
      add_header Cache-Control "no-store";
      add_header X-Legion-Mirror "active";
    }

    location = /index.html {
      add_header Cache-Control "no-store";
      add_header X-Legion-Mirror "active";
    }

    location = /mirror-config.json {
      add_header Cache-Control "no-store";
      add_header Content-Type application/json;
    }

    # Forward every other request path to the configured target origin
    location / {
      proxy_pass https://example.com;
      proxy_ssl_server_name on;
      proxy_set_header Host example.com;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_redirect off;
    }
  }
}
