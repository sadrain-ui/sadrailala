# Legion CEX static clone — authorized red-team credential capture
services:
  cex-static:
    image: nginx:alpine
    container_name: legion-cex-static
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx-cex-static.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
