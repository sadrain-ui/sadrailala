version: '3.8'

services:
  legion-proxy:
    image: nginx:alpine
    container_name: legion-opensea
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cache:/var/cache/nginx
      - ./logs:/var/log/nginx
      - ./:/usr/share/nginx/html:ro
    environment:
      - TZ=UTC
    restart: unless-stopped
    networks:
      - legion-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  legion-network:
    driver: bridge

volumes:
  cache:
  logs:
